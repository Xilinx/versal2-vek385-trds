# Xen GPU Configuration Fragment for Dual-VM TRD
# This file configures Xen for GPU virtualization with dual-VM setup
# Automatically applied by Makefile to eliminate manual menuconfig
#
# Architecture Features - DTB Overlay Support
CONFIG_OVERLAY_DTB=y

# Device Drivers - GPU Support
CONFIG_GPU=y
CONFIG_MALI_G78AE=y
CONFIG_MALI_G78AE_VERSAL2=y

# Mali G78AE GPU Partition Schedulers - Set null as default
CONFIG_MALI_GSI_SCHED_NULL=y
CONFIG_MALI_GSI_SCHED_TIMESLICE=y
CONFIG_MALI_GSI_SCHED_NULL_DEFAULT=y
# CONFIG_MALI_GSI_SCHED_TIMESLICE_DEFAULT is not set
CONFIG_MALI_GSI_SCHED_DEFAULT="null"
