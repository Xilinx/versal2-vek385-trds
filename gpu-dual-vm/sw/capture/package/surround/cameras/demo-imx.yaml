cameras:
  - camera:
    position: front
    intrinsic: imx623-intrinsic-common
    extrinsic:
      hfov: 120.0
      vfov: 90.0
      pos: [0.0, 1.0, -1.0]
      yaw: 0.0
      pitch: 0.0
      roll: 0.0

  - camera:
    position: back
    intrinsic: imx623-intrinsic-common
    extrinsic:
      hfov: 120.0
      vfov: 90.0
      pos: [0.0, 1.00, 1.0]
      yaw: 180.0
      pitch: 0.0
      roll: 0.0

  - camera:
    position: left
    intrinsic: imx623-intrinsic-common
    extrinsic:
      hfov: 120.0
      vfov: 90.0
      pos: [-0.8, 1.0, 0.0]
      yaw: -90.0
      pitch: 0.0
      roll: 0.0

  - camera:
    position: right
    intrinsic: imx623-intrinsic-common
    extrinsic:
      hfov: 120.0
      vfov: 90.0
      pos: [0.8, 1.0, 0.0]
      yaw: 90.0
      pitch: 0.0
      roll: 0.0
